line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # errores de estilo
    "F",   # variables/imports no usados
    "I",   # orden de imports
    "N",   # naming conventions
    "UP",  # upgrades a sintaxis moderna de Python
]
ignore = ["E501"]  # líneas largas — ruff format las maneja

[format]
quote-style = "double"
indent-style = "space"
